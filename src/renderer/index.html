<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Starfield Resource Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ヘッダー（ドラッグ移動用） -->
  <header id="titlebar">
    <span class="title">⛏ Resource Tracker</span>
    <div class="win-buttons">
      <button id="btn-compact" title="コンパクト表示">▤</button>
      <button id="btn-hide" title="トレイに格納（タスクトレイのアイコン or Ctrl+Shift+S で復帰）">—</button>
      <button id="btn-quit" title="終了">✕</button>
    </div>
  </header>

  <!-- 追加フォーム -->
  <form id="add-form" autocomplete="off">
    <div id="combo">
      <input id="name-input" placeholder="資源名" autocomplete="off" />
      <button type="button" id="combo-toggle" tabindex="-1" title="一覧">▼</button>
      <ul id="combo-list"></ul>
    </div>
    <button type="submit" id="btn-add">＋</button>
  </form>

  <!-- 一覧 -->
  <ul id="list"></ul>

  <!-- フッター -->
  <footer>
    <span id="count">0 件</span>
    <div class="footer-controls">
      <label class="opacity-ctl" title="不透明度">
        🔅
        <input id="opacity" type="range" min="0.3" max="1" step="0.05" value="0.9" />
      </label>
      <button id="btn-clear" title="全消去">🗑</button>
    </div>
  </footer>

  <script src="../data/resources.js"></script>
  <script src="../data/craftables.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
